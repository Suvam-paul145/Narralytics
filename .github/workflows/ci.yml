name: Full Stack Quality and Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend • Unit Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      REDIRECT_URI: http://localhost:8000/auth/callback
      FRONTEND_URL: http://localhost:5173
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: narralytics
      UPLOAD_DIR: ./uploads
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare CI secrets
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.CI_GEMINI_API_KEY }}
        run: |
          SCRIPT_PATH="${GITHUB_WORKSPACE:-.}/.github/scripts/generate_ci_secrets.py"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "CI secret generator missing at $SCRIPT_PATH"
            exit 1
          fi
          python "$SCRIPT_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest tests/test_config.py tests/test_health_endpoint.py -q

  data-workflow-profile:
    name: Data Workflow • Quality & CSV Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      REDIRECT_URI: http://localhost:8000/auth/callback
      FRONTEND_URL: http://localhost:5173
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: narralytics
      UPLOAD_DIR: ./uploads
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare CI secrets
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.CI_GEMINI_API_KEY }}
        run: |
          SCRIPT_PATH="${GITHUB_WORKSPACE:-.}/.github/scripts/generate_ci_secrets.py"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "CI secret generator missing at $SCRIPT_PATH"
            exit 1
          fi
          python "$SCRIPT_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate CSV pipeline and column codes
        run: pytest tests/test_csv_workflow_profile.py -q

  backend-security:
    name: Backend • Security Scans
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Bandit static analysis
        run: bandit -r . -x tests,__pycache__,.venv

      - name: Python dependency audit
        run: pip-audit -r requirements.txt

  frontend-quality:
    name: Frontend • Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          set -e

          HAS_ESLINT=0
          npm ls eslint > /dev/null 2>&1 && HAS_ESLINT=1
          HAS_LINT_SCRIPT=0
          if node - <<'NODE'
          const fs = require('fs');
          try {
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1);
          } catch (err) {
            console.error('Failed to parse package.json in current directory to check for lint script:', process.cwd(), err);
            process.exit(1);
          }
          NODE
          then
            HAS_LINT_SCRIPT=1
          fi

          if [ "$HAS_ESLINT" -eq 1 ] && [ "$HAS_LINT_SCRIPT" -eq 1 ]; then
            npm run lint
          else
            echo "Skipping lint: eslint, lint script, or configuration not present. Add eslint and a lint script to enable."
          fi

      - name: Build
        run: npm run build

      - name: Audit all frontend dependencies (critical level)
        run: npm audit --audit-level=critical
