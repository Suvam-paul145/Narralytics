name: Full Stack Quality and Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend • Unit Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      REDIRECT_URI: http://localhost:8000/auth/callback
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ci-jwt-secret-32-characters-long-12345
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: narralytics
      GEMINI_API_KEY: AIzaFakeApiKeyForCITests123456
      UPLOAD_DIR: ./uploads
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest tests/test_config.py tests/test_health_endpoint.py -q

  backend-security:
    name: Backend • Security Scans
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Bandit static analysis
        run: bandit -r . -x tests

      - name: Python dependency audit
        run: pip-audit -r requirements.txt

  frontend-quality:
    name: Frontend • Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high --omit=dev
