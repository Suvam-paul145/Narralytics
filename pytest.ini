[pytest]
addopts =
    --ignore=backend/tests/test_config.py
    --ignore=backend/tests/test_db_init.py
    --ignore=backend/tests/test_gemini_models.py
    --ignore=backend/tests/test_gemini_simple.py
    --ignore=backend/tests/test_mongodb_simple.py
    --ignore=backend/tests/test_setup.py
testpaths = backend/tests
norecursedirs =
    backend/.venv
    backend/venv
    backend/lambda_package_minimal
    frontend/node_modules
    frontend/dist
